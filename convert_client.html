<!DOCTYPE html>
<html>
<head>
    <title>Convert PNG to JPG</title>
</head>
<body>
    <h1>Converting Logo...</h1>
    <img id="source" src="images/foto1.png" style="display:none;" onload="convert()">
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="status">Loading image...</div>

    <script>
        function convert() {
            var img = document.getElementById('source');
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            
            canvas.width = img.width;
            canvas.height = img.height;
            
            // Draw white background
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw image on top
            ctx.drawImage(img, 0, 0);
            
            // Convert to JPG base64
            var dataURL = canvas.toDataURL('image/jpeg', 0.9);
            document.getElementById('status').innerText = 'Converting...';
            
            // Send to PHP
            fetch('save_jpg.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'image=' + encodeURIComponent(dataURL)
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('status').innerText = data;
            })
            .catch(error => {
                document.getElementById('status').innerText = 'Error: ' + error;
            });
        }
    </script>
</body>
</html>
